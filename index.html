      <h2>Projects</h2>

      <h3>ShelfCast: Sales Analytics &amp; Forecasting Dashboard</h3>
      <p>
        ShelfCast is a sales dashboard focused on providing analytics and insights,
        including predicting future sales using an advanced forecasting algorithm.
        Originally built for a specific local business in Lethbridge, I have since
        expanded the project with the goal of making it scalable for any small
        business that has POS data. It can upload CSV exports from a POS system,
        parse and store sales data in a local SQLite database, generate visual
        reports (top sellers, worst movers, sales trends, and category performance),
        produce bulk forecast reports, and filter all reports by date range and
        category.
      </p>

      <h3>Brezina Strength Academy</h3>
      <p>
        A personal coaching website built using Wix and Figma to showcase UI/UX
        design with a focus on accessibility and full mobile accessibility. I
        developed prototyping skills and demonstrated live usability testing in
        front of a live audience, applying Steve Krug's principles for accessibility
        so users never felt lost or overwhelmed.
      </p>

      <h3>Client's High-Performance Gaming Build</h3>
      <p>
        An end-to-end gaming PC build for a client working with a $2,500 CAD budget,
        delivered fully assembled and tuned for roughly $2,200. I guided the client
        from the first conversation: scoping what was achievable within budget,
        defining target resolutions and frame rates, walking through theme options,
        explaining the reasoning behind every choice, flagging buying traps to avoid,
        and using the PSU tier list to verify the power supply was genuinely worth
        its price. I advised on the full peripheral setup, assisted with the physical
        build, performed a clean Windows installation, removed bloatware, and enabled
        XMP/EXPO. Specifications: AMD Ryzen 5 7600X3D, ASRock Steel Legend Radeon RX
        9070 XT 16GB, ASUS TUF Gaming B650E-M E WIFI, TEAMGROUP T-Force Vulcan 32GB
        DDR5 6000MHz CL30, Nextorage NEM-PA 2TB NVMe SSD, SAMA G850 850W 80+ Gold,
        Vetroo V5 cooler, Lian Li VECTOR V100R MINI case.
      </p>

      <h3>Client's Gaming/Media Production Build</h3>
      <p>
        A custom-built PC designed for gaming, video editing, and social media
        creation. I worked with the client from the very start to select components
        within budget and explain each decision, provided build guidance, freshly
        installed Windows 11 Home, and assisted with software setup. Tuned for 1440p
        gaming with a future CPU upgrade path. Specifications: AMD Ryzen 5 7600, Acer
        Predator Radeon 9070 XT, ASRock B650M Pro RS, Patriot Viper 32GB DDR5 6000MHz
        CL36, 1TB Patriot P400 V4 SSD, Cooler Master MWE Gold V3 750W, Montech XM5
        case.
      </p>

      <h3>Personal Gaming + Productivity Build</h3>
      <p>
        A custom-built PC designed for gaming, content creation, and IT development
        work, with a strong balance of performance, cooling, and aesthetics, also
        used as a sandbox for hardware projects. Specifications: AMD Ryzen 5 7600,
        ASRock Radeon 6700 XT, Gigabyte B650 EAGLE, T-Create 32GB DDR5 6000MHz CL30,
        1TB SN770 NVMe SSD plus 2TB Seagate Barracuda HDD, Antec NeoECO 650W 80+ Gold,
        6x DeepCool CF120 RGB fans, DeepCool Matrexx 55 V3 case.
